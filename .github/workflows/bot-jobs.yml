name: Bot Jobs
run-name: Bot Jobs - ${{ github.event_name }} - ${{ github.event.schedule || github.event.inputs.mode || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Job a ejecutar"
        required: true
        default: "market_scan"
        type: choice
        options:
          - startup
          - market_scan
          - preclose
          - swing_report
          - news_scan
  schedule:
    - cron: "7 13-19 * * 1-5"
    - cron: "45 19 * * 1-5"
    - cron: "5 20 * * 1-5"
    - cron: "12 0,4,12 * * *"

jobs:
  run-bot-job:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve mode
        id: resolve_mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "7 13-19 * * 1-5" ]; then
            mode="market_scan"
          elif [ "${{ github.event.schedule }}" = "45 19 * * 1-5" ]; then
            mode="preclose"
          elif [ "${{ github.event.schedule }}" = "5 20 * * 1-5" ]; then
            mode="swing_report"
          elif [ "${{ github.event.schedule }}" = "12 0,4,12 * * *" ]; then
            mode="news_scan"
          else
            echo "No se pudo resolver el modo para este disparador."
            exit 1
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Modo seleccionado: $mode"

      - name: Run bot job
        env:
          BOT_NOTIFY_EMPTY_RUNS: "true"
          TELEGRAM_BOT_1_TOKEN: ${{ secrets.TELEGRAM_BOT_1_TOKEN }}
          TELEGRAM_BOT_1_CHAT_ID: ${{ secrets.TELEGRAM_BOT_1_CHAT_ID }}
          TELEGRAM_BOT_1_NAME: ${{ secrets.TELEGRAM_BOT_1_NAME }}
          TELEGRAM_BOT_2_TOKEN: ${{ secrets.TELEGRAM_BOT_2_TOKEN }}
          TELEGRAM_BOT_2_CHAT_ID: ${{ secrets.TELEGRAM_BOT_2_CHAT_ID }}
          TELEGRAM_BOT_2_NAME: ${{ secrets.TELEGRAM_BOT_2_NAME }}
          TELEGRAM_BOT_3_TOKEN: ${{ secrets.TELEGRAM_BOT_3_TOKEN }}
          TELEGRAM_BOT_3_CHAT_ID: ${{ secrets.TELEGRAM_BOT_3_CHAT_ID }}
          TELEGRAM_BOT_3_NAME: ${{ secrets.TELEGRAM_BOT_3_NAME }}
          TELEGRAM_BOT_4_TOKEN: ${{ secrets.TELEGRAM_BOT_4_TOKEN }}
          TELEGRAM_BOT_4_CHAT_ID: ${{ secrets.TELEGRAM_BOT_4_CHAT_ID }}
          TELEGRAM_BOT_4_NAME: ${{ secrets.TELEGRAM_BOT_4_NAME }}
          TELEGRAM_BOT_5_TOKEN: ${{ secrets.TELEGRAM_BOT_5_TOKEN }}
          TELEGRAM_BOT_5_CHAT_ID: ${{ secrets.TELEGRAM_BOT_5_CHAT_ID }}
          TELEGRAM_BOT_5_NAME: ${{ secrets.TELEGRAM_BOT_5_NAME }}
        run: python script_bolsa.py "${{ steps.resolve_mode.outputs.mode }}"

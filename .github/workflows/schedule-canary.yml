name: Schedule Canary
run-name: Schedule Canary - ${{ github.event_name }} - ${{ github.run_id }}

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * 1-5"

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "run_started_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Send Telegram heartbeat
        env:
          TELEGRAM_BOT_1_TOKEN: ${{ secrets.TELEGRAM_BOT_1_TOKEN }}
          TELEGRAM_BOT_1_CHAT_ID: ${{ secrets.TELEGRAM_BOT_1_CHAT_ID }}
        shell: bash
        run: |
          if [ -z "$TELEGRAM_BOT_1_TOKEN" ] || [ -z "$TELEGRAM_BOT_1_CHAT_ID" ]; then
            echo "Faltan secretos de Telegram para el canario."
            exit 1
          fi

          mensaje="CANARY OK: schedule de GitHub Actions ejecutado. event=${{ github.event_name }} schedule=${{ github.event.schedule }} repo=${{ github.repository }} run=${{ github.run_id }}"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_1_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_BOT_1_CHAT_ID}" \
            --data-urlencode "text=${mensaje}"
